name: Lint and Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v3
      with:
        version: v1.55
        args: --timeout=5m

    - name: Check formatting
      run: |
        unformatted=$(gofmt -l .)
        if [ -n "$unformatted" ]; then
          echo "Go files must be formatted with gofmt:"
          echo "$unformatted"
          exit 1
        fi

    - name: Check for common issues
      run: |
        # Check for TODO comments (informational only)
        todos=$(grep -rn "TODO:" . --exclude-dir=.git --include="*.go" || true)
        if [ -n "$todos" ]; then
          echo "ℹ️  TODO comments found (not blocking):"
          echo "$todos"
        fi
