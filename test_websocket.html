<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #status { padding: 10px; border-radius: 5px; margin: 10px 0; }
        .connected { background-color: #d4edda; color: #155724; }
        .disconnected { background-color: #f8d7da; color: #721c24; }
        #data { margin-top: 20px; padding: 15px; background-color: #f8f9fa; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>WebSocket Test Client</h1>
    
    <div id="status" class="disconnected">Disconnected</div>
    
    <div>
        <input type="text" id="wsUrl" value="ws://localhost:8080/ws" style="padding: 8px; width: 300px;">
        <button onclick="connectWebSocket()">Connect</button>
        <button onclick="disconnectWebSocket()" disabled>Disconnect</button>
    </div>
    
    <div id="data">
        <h3>Received Data:</h3>
        <pre id="dataContent">No data received yet</pre>
    </div>

    <script>
        let websocket = null;
        
        function connectWebSocket() {
            const wsUrl = document.getElementById('wsUrl').value;
            
            document.getElementById('status').textContent = 'Connecting...';
            document.getElementById('status').className = '';
            
            websocket = new WebSocket(wsUrl);
            
            websocket.onopen = function() {
                document.getElementById('status').textContent = 'Connected';
                document.getElementById('status').className = 'connected';
                document.querySelector('button[onclick="connectWebSocket()"]').disabled = true;
                document.querySelector('button[onclick="disconnectWebSocket()"]').disabled = false;
                console.log('WebSocket connected');
            };

            websocket.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    document.getElementById('dataContent').textContent = JSON.stringify(data, null, 2);
                    console.log('Message received:', data);
                } catch (err) {
                    console.error('Error parsing message:', err);
                }
            };

            websocket.onclose = function() {
                document.getElementById('status').textContent = 'Disconnected';
                document.getElementById('status').className = 'disconnected';
                document.querySelector('button[onclick="connectWebSocket()"]').disabled = false;
                document.querySelector('button[onclick="disconnectWebSocket()"]').disabled = true;
                console.log('WebSocket disconnected');
            };

            websocket.onerror = function(error) {
                document.getElementById('status').textContent = 'Error: ' + error.message;
                document.getElementById('status').className = 'disconnected';
                console.error('WebSocket error:', error);
            };
        }
        
        function disconnectWebSocket() {
            if (websocket) {
                websocket.close();
                websocket = null;
            }
        }
        
        // Auto-connect on page load for demo purposes
        window.addEventListener('load', function() {
            // Don't auto-connect, let user click the button
        });
    </script>
</body>
</html>
